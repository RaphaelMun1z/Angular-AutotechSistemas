<section class="contact" id="contact">
  <div class="contact-inner">
    <div class="contact-left">
      <div class="eyebrow"><span>Contato</span></div>
      <h2 class="sec-title rt">
        Fale com<br />nossos
        <span class="hl-y">especialistas</span>
      </h2>
      <p class="sec-sub">
        Nossa equipe está pronta para mostrar como a Autotech pode transformar a gestão do seu
        negócio.
      </p>
      <div class="con-items">
        <div class="con-item" data-aos="fade-up">
          <div class="con-ico">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path
                d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 15a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.62 4h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 11a16 16 0 0 0 6 6l.6-1.17a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 21 18"
              />
            </svg>
          </div>
          <div class="con-info">
            <h5>Telefone</h5>
            <p>+55 16 3263-9400</p>
          </div>
        </div>
        <div class="con-item" data-aos="fade-up">
          <div class="con-ico">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path
                d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"
              />
              <polyline points="22,6 12,13 2,6" />
            </svg>
          </div>
          <div class="con-info">
            <h5>E-mail</h5>
            <p>contato&#64;autotech.com.br</p>
          </div>
        </div>
      </div>
    </div>

    <div class="con-stepper-col">
      <div class="con-stepper-lbl">Processo</div>
      <div class="con-stepper">
        <div class="con-line" [style.height]="progressHeight"></div>

        <div class="con-step" [class.on]="currentStep >= 1">
          <div class="con-step-ico">
            <svg
              width="17"
              height="17"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
              <circle cx="12" cy="7" r="4" />
            </svg>
          </div>
          <span class="con-step-txt">Identificação</span>
        </div>

        <div class="con-step" [class.on]="currentStep >= 2">
          <div class="con-step-ico">
            <svg
              width="17"
              height="17"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <rect x="2" y="7" width="20" height="14" rx="2" />
              <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16" />
            </svg>
          </div>
          <span class="con-step-txt">Seu Negócio</span>
        </div>

        <div class="con-step" [class.on]="currentStep >= 3">
          <div class="con-step-ico">
            <svg
              width="17"
              height="17"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
            </svg>
          </div>
          <span class="con-step-txt">Necessidades</span>
        </div>

        <div class="con-step" [class.on]="currentStep >= 4">
          <div class="con-step-ico">
            <svg
              width="17"
              height="17"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <polyline points="20 6 9 17 4 12" />
            </svg>
          </div>
          <span class="con-step-txt">Pronto</span>
        </div>
      </div>
    </div>

    <div class="contact-form">
      <h3 class="rt">Agendar demo gratuita</h3>
      <form [formGroup]="contactForm" (ngSubmit)="onSubmit()">
        <div class="fg-row">
          <div class="fg">
            <label>Nome</label>
            <input type="text" formControlName="nome" placeholder="João" />
          </div>
          <div class="fg">
            <label>Sobrenome</label>
            <input type="text" formControlName="sobrenome" placeholder="Silva" />
          </div>
        </div>
        <div class="fg">
          <label>E-mail Profissional</label>
          <input type="email" formControlName="email" placeholder="joao@suaoficina.com.br" />
        </div>
        <div class="fg-row">
          <div class="fg">
            <label>Telefone / WhatsApp</label>
            <input type="tel" formControlName="telefone" placeholder="(16) 99999-0000" />
          </div>
          <div class="fg">
            <label>Cidade</label>
            <input type="text" formControlName="cidade" placeholder="Ribeirão Preto, SP" />
          </div>
        </div>
        <div class="fg">
          <label>Segmento da Empresa</label>
          <select formControlName="segmento">
            <option value="" disabled selected>Selecione seu segmento</option>
            <option value="oficina">Oficina Mecânica</option>
            <option value="concessionaria">Concessionária</option>
            <option value="autopecas">Loja de Autopeças</option>
            <option value="estetica">Estética Automotiva</option>
            <option value="outro">Outro</option>
          </select>
        </div>
        <div class="fg">
          <label>Mensagem (opcional)</label>
          <textarea
            formControlName="mensagem"
            rows="3"
            placeholder="Conte um pouco sobre sua necessidade..."
          ></textarea>
        </div>
        <button type="submit" class="form-sub" [disabled]="!contactForm.valid">
          <span>Agendar Demo Gratuita →</span>
        </button>
      </form>
    </div>
  </div>
</section>
