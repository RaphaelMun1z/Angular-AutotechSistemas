<section class="integrations" id="integrations">
  <div class="sec-hdr">
    <div class="eyebrow"><span>Integrações</span></div>
    <h2 class="sec-title rt">Conecte tudo que<br />você já <span class="hl-r">usa</span></h2>
    <p class="sec-sub">
      Integre com mais de 40 plataformas. Notas fiscais, pagamentos, fornecedores e muito mais em um
      clique.
    </p>
  </div>

  <div class="int-grid">
    @for (int of integrations; track int.name) {
      <div class="int-card" data-aos="fade-up">
        <div class="int-logo" [style.background]="int.bg">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="#111"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            style="width: 1.2em; height: 1.2em"
            [innerHTML]="int.svg"
          ></svg>
        </div>
        <div class="int-name">{{ int.name }}</div>

        @if (int.badge) {
          <div class="int-badge" [class]="int.badge.type">{{ int.badge.text }}</div>
        }
      </div>
    }
  </div>

  <div class="int-cta">
    Não encontrou a sua?
    <a href="#contact" (click)="scrollToContact($event)">Solicite uma integração →</a>
  </div>
</section>
